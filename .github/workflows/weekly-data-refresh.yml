name: Weekly Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1"

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ETL dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y tippecanoe

      - name: Rebuild data files
        run: |
          python3 etl/build_data.py
          python3 scripts/build_tree_render_tiles.py --data-dir public/data

      - name: Check region data sizes
        run: python3 scripts/check_region_data_sizes.py --data-dir public/data --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Commit updated data
        run: |
          if [ -z "$(git status --porcelain public/data)" ]; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(data): weekly refresh"
          git push
